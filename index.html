<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>書目宇宙 Prototype</title>
  <style>
    :root {
      --bg: #eef6fb;
      --ink: #183247;
      --muted: #62798c;
      --card: #fbfdff;
      --line: #cfe0ec;
      --rose: #3e79a8;
      --rose-soft: #dcebf5;
      --green: #3f8f7a;
      --green-soft: #dff1ec;
      --blue: #2f6f9f;
      --blue-soft: #d9eaf6;
      --gold: #a9863d;
      --gold-soft: #f2ead8;
      --ink-soft: #e4eef6;
      --shadow: 0 12px 32px rgba(28, 69, 101, .1);
    }

    [data-theme="dark"] {
      --bg: #101b26;
      --ink: #edf6fb;
      --muted: #9bb0c0;
      --card: #172636;
      --line: #294258;
      --rose: #89c2ea;
      --rose-soft: #173449;
      --green: #75c8af;
      --green-soft: #17362f;
      --blue: #9bd0f2;
      --blue-soft: #183246;
      --gold: #dec77b;
      --gold-soft: #352f1d;
      --ink-soft: #22364a;
      --shadow: 0 12px 32px rgba(0, 0, 0, .28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
      line-height: 1.55;
    }

    button, input, select {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    .auth-view {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(120deg, rgba(16, 46, 72, .82), rgba(46, 105, 147, .42)),
        url("https://images.unsplash.com/photo-1519682337058-a94d519337bc?auto=format&fit=crop&w=1800&q=80") center/cover;
    }

    .auth-card {
      width: min(430px, 100%);
      background: var(--card);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .28);
    }

    .auth-card h1 {
      margin: 0 0 6px;
      font-size: 30px;
      letter-spacing: 0;
    }

    .auth-form {
      display: grid;
      gap: 11px;
      margin: 18px 0;
    }

    .auth-form label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .auth-form input {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bg);
      color: var(--ink);
      padding: 10px 12px;
    }

    .auth-error {
      min-height: 20px;
      color: #b05465;
      font-size: 13px;
    }

    .demo-accounts {
      display: grid;
      gap: 7px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .account-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .account-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--bg);
      color: var(--muted);
      padding: 7px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .hero {
      min-height: 230px;
      padding: 36px 22px 30px;
      color: #fff;
      background:
        linear-gradient(120deg, rgba(13, 42, 67, .86), rgba(45, 105, 148, .5)),
        url("https://images.unsplash.com/photo-1519682337058-a94d519337bc?auto=format&fit=crop&w=1800&q=80") center/cover;
      display: grid;
      align-content: end;
      gap: 10px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 58px);
      letter-spacing: 0;
      line-height: 1.05;
      text-shadow: 0 6px 26px rgba(0, 0, 0, .42);
    }

    .hero p {
      margin: 0;
      max-width: 720px;
      font-size: 15px;
      opacity: .94;
      text-shadow: 0 2px 16px rgba(0, 0, 0, .38);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto auto auto;
      gap: 10px;
      align-items: center;
      padding: 12px 18px;
      background: color-mix(in srgb, var(--card) 92%, transparent);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .search {
      min-width: 0;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--bg);
      color: var(--ink);
      padding: 10px 13px;
    }

    .ctl {
      min-height: 39px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      color: var(--ink);
      padding: 8px 12px;
      cursor: pointer;
    }

    .ctl:hover, .chip:hover, .tree button:hover {
      border-color: var(--rose);
      color: var(--rose);
    }

    .shell {
      width: min(1220px, calc(100% - 28px));
      margin: 18px auto 48px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      position: sticky;
      top: 76px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .panel h2, .section-title {
      margin: 0 0 12px;
      font-size: 17px;
      letter-spacing: 0;
    }

    .tree {
      display: grid;
      gap: 8px;
    }

    .tree button {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .tree button.active {
      background: var(--rose-soft);
      color: var(--rose);
      border-color: color-mix(in srgb, var(--rose) 42%, transparent);
    }

    .tree .count {
      color: var(--muted);
      font-size: 12px;
    }

    .filters {
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .chipset {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--ink);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      cursor: pointer;
    }

    .chip.active {
      background: var(--blue-soft);
      color: var(--blue);
      border-color: color-mix(in srgb, var(--blue) 46%, transparent);
    }

    .main {
      min-width: 0;
      display: grid;
      gap: 18px;
    }

    .strip {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(210px, 1fr);
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
    }

    .small-card, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .small-card {
      padding: 11px 12px;
      cursor: pointer;
    }

    .small-card b {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 14px;
    }

    .small-card span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      gap: 9px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .random-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      position: relative;
      border-left: 4px solid var(--line);
      padding: 13px 14px;
      cursor: pointer;
      min-height: 174px;
    }

    .card:hover {
      border-color: var(--rose);
      box-shadow: 0 14px 34px rgba(47, 111, 159, .16);
    }

    .card.status-ongoing { border-left-color: var(--blue); }
    .card.status-done { border-left-color: var(--green); }

    .title {
      margin: 0 0 5px;
      font-weight: 700;
      font-size: 16px;
      padding-right: 36px;
    }

    .k-title {
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 9px;
    }

    .meta {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      background: var(--ink-soft);
      color: var(--muted);
    }

    .badge.done { background: var(--green-soft); color: var(--green); }
    .badge.ongoing { background: var(--blue-soft); color: var(--blue); }
    .badge.new { background: var(--gold-soft); color: var(--gold); }
    .badge.page { background: var(--rose-soft); color: var(--rose); }
    .badge.paid { background: #e8effb; color: #315f96; }

    [data-theme="dark"] .badge.paid {
      background: #203853;
      color: #a8d0f2;
    }

    .fav {
      position: absolute;
      right: 9px;
      top: 9px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--rose);
      cursor: pointer;
    }

    .links {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .links a, .modal-links a {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--ink);
      text-decoration: none;
      font-size: 12px;
      background: var(--bg);
    }

    .links a:hover, .modal-links a:hover {
      color: var(--rose);
      border-color: var(--rose);
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      min-height: 180px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      background: color-mix(in srgb, var(--card) 70%, transparent);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, .48);
      z-index: 50;
    }

    .modal.open { display: flex; }

    .sheet {
      width: min(620px, 100%);
      max-height: 86vh;
      overflow: auto;
      background: var(--card);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .26);
    }

    .reader-sheet {
      width: min(1040px, calc(100vw - 28px));
      height: min(88vh, 820px);
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .reader-frame {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .sheet-head {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: start;
    }

    .close {
      border: 1px solid var(--line);
      border-radius: 50%;
      width: 34px;
      height: 34px;
      background: var(--bg);
      color: var(--ink);
      cursor: pointer;
      flex: 0 0 auto;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding: 11px 0;
      font-size: 14px;
    }

    .detail-row dt {
      color: var(--muted);
    }

    .detail-row dd {
      margin: 0;
    }

    @media (max-width: 820px) {
      .topbar {
        grid-template-columns: 1fr auto;
      }

      .search {
        grid-column: 1 / -1;
        order: 1;
      }

      .topbar select {
        order: 2;
      }

      .topbar #theme {
        order: 3;
      }

      .account-bar {
        grid-column: 1 / -1;
        justify-content: flex-start;
        order: 4;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }

      .tree {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .auth-view {
        padding: 16px;
      }

      .auth-card {
        padding: 18px;
      }

      .hero {
        min-height: 260px;
        padding: 30px 18px 24px;
      }

      .topbar {
        grid-template-columns: 1fr 1fr;
        padding: 10px 12px;
      }

      .topbar .ctl,
      .topbar select {
        width: 100%;
      }

      .account-bar {
        display: grid;
        grid-template-columns: 1fr auto;
        width: 100%;
      }

      .random-actions {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .account-pill {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .tree {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .detail-row {
        grid-template-columns: 1fr;
        gap: 2px;
      }

      .modal {
        padding: 8px;
      }

      .sheet {
        max-height: 92vh;
        padding: 16px;
      }

      .reader-sheet {
        width: calc(100vw - 16px);
        height: 92vh;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="auth-view" id="authView">
    <section class="auth-card">
      <h1>書目宇宙</h1>
      <div class="hint">登入後進入書目索引。這是第一階段雛形，先用測試帳號確認會員流程。</div>
      <form class="auth-form" id="loginForm">
        <label>
          帳號
          <input id="loginEmail" type="text" autocomplete="username" placeholder="請輸入帳號" required>
        </label>
        <label>
          密碼
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="請輸入密碼" required>
        </label>
        <button class="ctl" type="submit">登入</button>
        <div class="auth-error" id="loginError"></div>
      </form>
    </section>
  </main>

  <div id="appRoot" hidden>
  <header class="hero">
    <h1>書目宇宙</h1>
    <p>把 Google Sheet 的書目資料轉成像作品索引站一樣的卡片瀏覽。登入角色會決定哪些譯文可以閱讀。</p>
  </header>

  <div class="topbar">
    <input id="search" class="search" placeholder="搜尋翻譯篇名 / 韓文篇名 / 原作 / 翻譯小天使">
    <select id="sort" class="ctl" aria-label="排序">
      <option value="date-desc">日期新到舊</option>
      <option value="title">篇名 A-Z</option>
      <option value="author">原作 A-Z</option>
    </select>
    <button id="theme" class="ctl" type="button">深色</button>
    <div class="account-bar">
      <span class="account-pill" id="accountLabel"></span>
      <button id="logoutBtn" class="ctl" type="button">登出</button>
    </div>
  </div>

  <div class="shell">
    <aside class="panel">
      <h2>分頁樹</h2>
      <nav class="tree" id="tree"></nav>

      <div class="filters">
        <h2>狀態</h2>
        <div class="chipset" id="statusFilters"></div>
      </div>

      <div class="filters" id="adminPanel" hidden>
        <h2>管理</h2>
        <div class="hint" id="adminStats"></div>
      </div>
    </aside>

    <main class="main">
      <section>
        <h2 class="section-title">最新收錄</h2>
        <div class="strip" id="latest"></div>
      </section>

      <section>
        <div class="toolbar">
          <div>
            <h2 class="section-title" id="resultTitle">全部作品</h2>
            <div class="hint" id="countText"></div>
          </div>
          <div class="random-actions">
            <button class="ctl" id="randomBtn" type="button">隨機看一篇</button>
            <button class="ctl" id="recentRandomBtn" type="button">近期隨機</button>
          </div>
        </div>
        <div class="grid" id="grid"></div>
      </section>
    </main>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="sheet-head">
        <div>
          <h2 id="modalTitle" style="margin:0 0 4px"></h2>
          <div id="modalSub" class="k-title"></div>
        </div>
        <button class="close" id="closeBtn" type="button" aria-label="關閉">×</button>
      </div>
      <div class="badges" id="modalBadges"></div>
      <dl id="modalRows"></dl>
      <div class="modal-links links" id="modalLinks"></div>
    </div>
  </div>

  <div class="modal" id="readerModal" aria-hidden="true">
    <div class="sheet reader-sheet" role="dialog" aria-modal="true" aria-labelledby="readerTitle">
      <div class="sheet-head">
        <div>
          <h2 id="readerTitle" style="margin:0 0 4px"></h2>
          <div id="readerSub" class="k-title"></div>
        </div>
        <button class="close" id="readerCloseBtn" type="button" aria-label="關閉">×</button>
      </div>
      <iframe id="readerFrame" class="reader-frame" title="譯文預覽"></iframe>
    </div>
  </div>
  </div>

  <script src="data.js"></script>
  <script>
    const DATA = window.BOOK_DATA || [];

    const USERS = [
      { email: "annyeongz", password: "annyeongz831901", name: "付費會員", role: "premium" },
      { email: "premium@example.com", password: "premium123", name: "付費會員", role: "premium" },
      { email: "garygary", password: "18251507", name: "管理員", role: "admin" }
    ];

    const ROLE_LABELS = {
      member: "一般會員",
      premium: "付費會員",
      admin: "管理員"
    };

    const state = {
      page: "全部",
      status: "全部",
      query: "",
      sort: "date-desc",
      user: JSON.parse(localStorage.getItem("bookPrototypeUser") || "null"),
      favs: new Set(JSON.parse(localStorage.getItem("bookPrototypeFavs") || "[]"))
    };

    const el = {
      authView: document.querySelector("#authView"),
      appRoot: document.querySelector("#appRoot"),
      loginForm: document.querySelector("#loginForm"),
      loginEmail: document.querySelector("#loginEmail"),
      loginPassword: document.querySelector("#loginPassword"),
      loginError: document.querySelector("#loginError"),
      tree: document.querySelector("#tree"),
      statusFilters: document.querySelector("#statusFilters"),
      adminPanel: document.querySelector("#adminPanel"),
      adminStats: document.querySelector("#adminStats"),
      grid: document.querySelector("#grid"),
      latest: document.querySelector("#latest"),
      countText: document.querySelector("#countText"),
      resultTitle: document.querySelector("#resultTitle"),
      search: document.querySelector("#search"),
      sort: document.querySelector("#sort"),
      theme: document.querySelector("#theme"),
      accountLabel: document.querySelector("#accountLabel"),
      logout: document.querySelector("#logoutBtn"),
      random: document.querySelector("#randomBtn"),
      recentRandom: document.querySelector("#recentRandomBtn"),
      modal: document.querySelector("#modal"),
      close: document.querySelector("#closeBtn"),
      modalTitle: document.querySelector("#modalTitle"),
      modalSub: document.querySelector("#modalSub"),
      modalBadges: document.querySelector("#modalBadges"),
      modalRows: document.querySelector("#modalRows"),
      modalLinks: document.querySelector("#modalLinks"),
      reader: document.querySelector("#readerModal"),
      readerClose: document.querySelector("#readerCloseBtn"),
      readerTitle: document.querySelector("#readerTitle"),
      readerSub: document.querySelector("#readerSub"),
      readerFrame: document.querySelector("#readerFrame")
    };

    function dateKey(item) {
      return Number(String(item.date || "").replaceAll("-", "")) || 0;
    }

    function normalize(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, "");
    }

    function statusClass(item) {
      return item.status.includes("連載") ? "ongoing" : "done";
    }

    function statusText(item) {
      return String(item.status || "未分類").replace(/^\d\./, "");
    }

    function canRead(item) {
      if (!state.user) return false;
      if (!item.paid) return true;
      return state.user.role === "premium" || state.user.role === "admin";
    }

    function roleLabel(user) {
      return ROLE_LABELS[user?.role] || "未登入";
    }

    function visibleItems() {
      const q = normalize(state.query);
      let items = DATA.filter(item => {
        const pageOK = state.page === "全部" || item.page === state.page;
        const statusOK = state.status === "全部" || item.status === state.status;
        const hay = normalize([item.zh, item.ko, item.author, item.translator, item.note].join(" "));
        return pageOK && statusOK && (!q || hay.includes(q));
      });

      if (state.sort === "date-desc") items.sort((a, b) => dateKey(b) - dateKey(a));
      if (state.sort === "title") items.sort((a, b) => a.zh.localeCompare(b.zh, "zh-Hant"));
      if (state.sort === "author") items.sort((a, b) => a.author.localeCompare(b.author, "zh-Hant"));
      return items;
    }

    function recentItems() {
      return visibleItems().filter(item => /@新入荷|@有更新/.test(item.note || ""));
    }

    function openRandom(items, emptyMessage) {
      if (!items.length) {
        window.alert(emptyMessage);
        return;
      }
      openDetail(DATA.indexOf(items[Math.floor(Math.random() * items.length)]));
    }

    function pageCounts() {
      const counts = new Map();
      DATA.forEach(item => counts.set(item.page, (counts.get(item.page) || 0) + 1));
      return [...counts.entries()]
        .map(([name, count]) => ({ name, count }))
        .sort((a, b) => a.name.localeCompare(b.name, "zh-Hant"));
    }

    function renderTree() {
      const total = DATA.length;
      const pages = [{ name: "全部", count: total }, ...pageCounts()];
      el.tree.innerHTML = pages.map(p => `
        <button type="button" class="${state.page === p.name ? "active" : ""}" data-page="${p.name}">
          <span>${p.name === "全部" ? "書目總覽" : "#" + p.name}</span>
          <span class="count">${p.count}</span>
        </button>
      `).join("");
    }

    function renderStatusFilters() {
      const statuses = ["全部", ...new Set(DATA.map(item => item.status))];
      el.statusFilters.innerHTML = statuses.map(status => `
        <button type="button" class="chip ${state.status === status ? "active" : ""}" data-status="${status}">
          ${status === "全部" ? "全部" : statusText({ status })}
        </button>
      `).join("");
    }

    function badges(item) {
      const cls = statusClass(item);
      return `
        <span class="badge ${cls}">${statusText(item)}</span>
        <span class="badge page">#${item.page}</span>
        ${item.paid ? `<span class="badge paid">付費</span>` : ""}
        ${item.folderFallback ? `<span class="badge paid">資料夾</span>` : ""}
        ${item.note ? `<span class="badge new">${item.note}</span>` : ""}
      `;
    }

    function previewUrl(url) {
      if (!url) return "";
      const docsMatch = url.match(/docs\.google\.com\/document\/d\/([^/?#]+)/);
      if (docsMatch) return `https://docs.google.com/document/d/${docsMatch[1]}/preview`;
      const fileMatch = url.match(/drive\.google\.com\/file\/d\/([^/?#]+)/);
      if (fileMatch) return `https://drive.google.com/file/d/${fileMatch[1]}/preview`;
      return "";
    }

    function protectedLink(item, kind, label) {
      const url = kind === "original" ? item.original : item.translation;
      if (!url) return "";
      if (item.paid && !canRead(item)) {
        return `<a href="#" onclick="event.preventDefault();event.stopPropagation();showAccessDenied()">${label} · 需付費會員</a>`;
      }
      if (kind !== "original" && previewUrl(url)) {
        return `<a href="#" onclick="event.preventDefault();event.stopPropagation();openProtected(${DATA.indexOf(item)}, '${kind}')">${label}</a>`;
      }
      if (!item.paid) {
        return `<a href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${label}</a>`;
      }
      return `<a href="#" onclick="event.preventDefault();event.stopPropagation();openProtected(${DATA.indexOf(item)}, '${kind}')">${label}</a>`;
    }

    function episodeLinks(item) {
      if (!item.episodes || !item.episodes.length) return "";
      return item.episodes.map((episode, index) => {
        if (!episode.url) return "";
        if (item.paid && !canRead(item)) {
          return `<a href="#" onclick="event.preventDefault();event.stopPropagation();showAccessDenied()">${episode.label} · 需付費會員</a>`;
        }
        if (!item.paid && !previewUrl(episode.url)) {
          return `<a href="${episode.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${episode.label}</a>`;
        }
        return `<a href="#" onclick="event.preventDefault();event.stopPropagation();openProtected(${DATA.indexOf(item)}, 'episode:${index}')">${episode.label}</a>`;
      }).join("");
    }

    function card(item) {
      const id = DATA.indexOf(item);
      const fav = state.favs.has(id);
      return `
        <article class="card status-${statusClass(item)}" data-id="${id}" tabindex="0">
          <button class="fav" type="button" data-fav="${id}" aria-label="收藏">${fav ? "♥" : "♡"}</button>
          <h3 class="title">${item.zh}</h3>
          <div class="k-title">${item.ko}</div>
          <div class="badges">${badges(item)}</div>
          <div class="meta">
            <span>原作：${item.author}</span>
            <span>翻譯：${item.translator || "未填"}</span>
            <span>日期：${item.date}</span>
          </div>
          <div class="links">
            ${protectedLink(item, "original", "原文")}
            ${item.episodes && item.episodes.length ? episodeLinks(item) : protectedLink(item, "translation", "譯文")}
          </div>
        </article>
      `;
    }

    function renderLatest() {
      el.latest.innerHTML = [...DATA]
        .sort((a, b) => dateKey(b) - dateKey(a))
        .slice(0, 6)
        .map(item => `<button class="small-card" type="button" data-id="${DATA.indexOf(item)}"><b>${item.zh}</b><span>#${item.page} · ${item.date}</span></button>`)
        .join("");
    }

    function renderGrid() {
      const items = visibleItems();
      el.resultTitle.textContent = state.page === "全部" ? "全部作品" : `#${state.page}`;
      el.countText.textContent = `${items.length} / ${DATA.length} 筆，依目前條件顯示`;
      el.grid.innerHTML = items.length ? items.map(card).join("") : `<div class="empty">找不到符合條件的作品</div>`;
    }

    function render() {
      renderShell();
      if (!state.user) return;
      renderTree();
      renderStatusFilters();
      renderLatest();
      renderGrid();
    }

    function renderShell() {
      const loggedIn = Boolean(state.user);
      el.authView.hidden = loggedIn;
      el.appRoot.hidden = !loggedIn;
      if (!loggedIn) return;
      el.accountLabel.textContent = `${state.user.name} · ${roleLabel(state.user)}`;
      el.adminPanel.hidden = state.user.role !== "admin";
      if (state.user.role === "admin") {
        const paid = DATA.filter(item => item.paid).length;
        const episodes = DATA.filter(item => item.episodes && item.episodes.length).length;
        el.adminStats.textContent = `共 ${DATA.length} 筆，付費 ${paid} 筆，連載 ${episodes} 筆。`;
      }
    }

    function row(label, value) {
      return `<div class="detail-row"><dt>${label}</dt><dd>${value || "未填"}</dd></div>`;
    }

    function openDetail(id) {
      const item = DATA[id];
      el.modalTitle.textContent = item.zh;
      el.modalSub.textContent = item.ko;
      el.modalBadges.innerHTML = badges(item);
      el.modalRows.innerHTML = [
        row("分頁", "#" + item.page),
        row("狀態", statusText(item)),
        row("原作", item.author),
        row("翻譯", item.translator),
        row("付費", item.paid ? "是，需付費會員或管理員" : "否"),
        row("譯文", item.folderFallback ? "暫時只能連到資料夾" : "直連 Word/Docs"),
        row("備註", item.note),
        row("日期", item.date)
      ].join("");
      el.modalLinks.innerHTML = `
        ${protectedLink(item, "original", "原文連結")}
        ${item.episodes && item.episodes.length ? episodeLinks(item) : protectedLink(item, "translation", "譯文連結")}
      `;
      el.modal.classList.add("open");
      el.modal.setAttribute("aria-hidden", "false");
    }

    function openProtected(id, kind) {
      const item = DATA[id];
      if (!item) return;
      const url = kind.startsWith("episode:")
        ? item.episodes[Number(kind.split(":")[1])]?.url
        : kind === "original" ? item.original : item.translation;
      if (!url) return;
      if (item.paid && !canRead(item)) {
        showAccessDenied();
        return;
      }
      if (kind !== "original") {
        const embedded = previewUrl(url);
        if (embedded) {
          openReader(item, kind, embedded);
          return;
        }
      }
      window.open(url, "_blank", "noopener");
    }

    function showAccessDenied() {
      window.alert("這篇需要付費會員或管理員權限。正式版會在後端檢查帳號權限。");
    }

    function openReader(item, kind, url) {
      const episodeIndex = kind.startsWith("episode:") ? Number(kind.split(":")[1]) : null;
      const episode = episodeIndex !== null ? item.episodes[episodeIndex] : null;
      el.readerTitle.textContent = item.zh;
      el.readerSub.textContent = episode ? `${item.ko} · ${episode.label}` : item.ko;
      el.readerFrame.src = url;
      el.reader.classList.add("open");
      el.reader.setAttribute("aria-hidden", "false");
    }

    function closeReader() {
      el.reader.classList.remove("open");
      el.reader.setAttribute("aria-hidden", "true");
      el.readerFrame.src = "about:blank";
    }

    function closeDetail() {
      el.modal.classList.remove("open");
      el.modal.setAttribute("aria-hidden", "true");
    }

    document.addEventListener("click", event => {
      const pageButton = event.target.closest("[data-page]");
      if (pageButton) {
        state.page = pageButton.dataset.page;
        render();
        return;
      }

      const statusButton = event.target.closest("[data-status]");
      if (statusButton) {
        state.status = statusButton.dataset.status;
        render();
        return;
      }

      const favButton = event.target.closest("[data-fav]");
      if (favButton) {
        event.stopPropagation();
        const id = Number(favButton.dataset.fav);
        state.favs.has(id) ? state.favs.delete(id) : state.favs.add(id);
        localStorage.setItem("bookPrototypeFavs", JSON.stringify([...state.favs]));
        renderGrid();
        return;
      }

      const cardEl = event.target.closest("[data-id]");
      if (cardEl) openDetail(Number(cardEl.dataset.id));
    });

    el.loginForm.addEventListener("submit", event => {
      event.preventDefault();
      const email = el.loginEmail.value.trim().toLowerCase();
      const password = el.loginPassword.value;
      const user = USERS.find(account => account.email === email && account.password === password);
      if (!user) {
        el.loginError.textContent = "帳號或密碼不正確";
        return;
      }
      state.user = { email: user.email, name: user.name, role: user.role };
      localStorage.setItem("bookPrototypeUser", JSON.stringify(state.user));
      el.loginPassword.value = "";
      el.loginError.textContent = "";
      render();
    });

    el.logout.addEventListener("click", () => {
      state.user = null;
      localStorage.removeItem("bookPrototypeUser");
      closeDetail();
      closeReader();
      render();
    });

    el.search.addEventListener("input", event => {
      state.query = event.target.value;
      renderGrid();
    });

    el.sort.addEventListener("change", event => {
      state.sort = event.target.value;
      renderGrid();
    });

    el.theme.addEventListener("click", () => {
      const dark = document.documentElement.getAttribute("data-theme") === "dark";
      document.documentElement.setAttribute("data-theme", dark ? "light" : "dark");
      el.theme.textContent = dark ? "深色" : "淺色";
    });

    el.random.addEventListener("click", () => {
      openRandom(visibleItems(), "目前條件下沒有作品可以隨機。");
    });

    el.recentRandom.addEventListener("click", () => {
      openRandom(recentItems(), "目前條件下沒有近期更新的作品。");
    });

    el.close.addEventListener("click", closeDetail);
    el.readerClose.addEventListener("click", closeReader);
    el.modal.addEventListener("click", event => {
      if (event.target === el.modal) closeDetail();
    });
    el.reader.addEventListener("click", event => {
      if (event.target === el.reader) closeReader();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeDetail();
        closeReader();
      }
    });

    render();
  </script>
</body>
</html>
